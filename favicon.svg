<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#f0e0b0"/>
      <stop offset="45%"  stop-color="#e2c98a"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%"   stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#060e1d"/>
    </radialGradient>
  </defs>

  <!-- Fondo azul marino con esquinas redondeadas -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Borde dorado sutil -->
  <rect width="32" height="32" rx="7" fill="none"
        stroke="url(#gold)" stroke-width="1.2" opacity="0.55"/>

  <!-- E en itálica serif dorada -->
  <text x="16.5" y="25"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="27"
        font-weight="400"
        fill="url(#gold)">E</text>
</svg>
